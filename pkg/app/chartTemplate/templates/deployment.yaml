apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{"{{"}} include "exemple.fullname" . {{"}}"}}
  labels:
    {{"{{"}}- include "exemple.labels" . | nindent 4 {{"}}"}}
  annotations:
    {{"{{"}}- with .Values.deploymentAnnotations -{{"}}"}}
      {{"{{"}}- toYaml . | nindent 4 {{"}}"}}
    {{"{{"}}- end {{"}}"}}

spec:
  {{"{{"}}- if not .Values.autoscaling.enabled {{"}}"}}
  replicas: {{"{{"}} .Values.replicaCount {{"}}"}}
  {{"{{"}}- end {{"}}"}}
  selector:
    matchLabels:
      {{"{{"}}- include "exemple.selectorLabels" . | nindent 6 {{"}}"}}
  template:
    metadata:
      {{"{{"}}- with .Values.podAnnotations {{"}}"}}
      annotations:
        {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      labels:
        {{"{{"}}- include "exemple.selectorLabels" . | nindent 8 {{"}}"}}
    spec:
      {{"{{"}}- with .Values.imagePullSecrets {{"}}"}}
      imagePullSecrets:
        {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      serviceAccountName: {{"{{"}} include "exemple.serviceAccountName" . {{"}}"}}
      securityContext:
        {{"{{"}}- toYaml .Values.podSecurityContext | nindent 8 {{"}}"}}
      containers:
        - name: {{"{{"}} .Chart.Name {{"}}"}}
          securityContext:
            {{"{{"}}- toYaml .Values.securityContext | nindent 12 {{"}}"}}
          image: "{{"{{"}} .Values.image.repository }}:{{"{{"}} .Values.image.tag | default .Chart.AppVersion {{"}}"}}"
          {{"{{"}}- with .Values.volumeMounts {{"}}"}}
          volumeMounts:
            {{"{{"}}- toYaml . | nindent 12 {{"}}"}}
          {{"{{"}}- end {{"}}"}}
          {{ if .Configmap }}
          envFrom:
          {{"{{"}}- range .Values.additionalEnvFrom {{"}}"}}
          - {{"{{"}}- . | toYaml | nindent 12 {{"}}"}}
          {{"{{"}}- end {{"}}"}}
          - configMapRef:
              name: {{"{{"}} include "exemple.fullname" . {{"}}"}}
          {{ end }}
          imagePullPolicy: {{"{{"}} .Values.image.pullPolicy {{"}}"}}

          {{ if .Service }}
          ports:
            - name: http
              containerPort: {{"{{"}} .Values.service.port {{"}}"}}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          {{ end }}
          resources:
            {{"{{"}}- toYaml .Values.resources | nindent 12 {{"}}"}}
      {{"{{"}}- with .Values.nodeSelector {{"}}"}}
      nodeSelector:
        {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- with .Values.affinity {{"}}"}}
      affinity:
        {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- with .Values.tolerations {{"}}"}}
      tolerations:
        {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{ if .Volumes }}
      {{"{{"}}- with .Values.volumes {{"}}"}}
      volumes:
        {{"{{"}}- toYaml . | nindent 12 {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{ end }}
